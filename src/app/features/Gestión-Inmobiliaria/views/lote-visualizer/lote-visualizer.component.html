<div class="visualizer-container">
  <div class="manzana-grid">
    @for (lote of lotes; track lote.id) {
      <div
        class="lote-box"
        [ngClass]="lote.estado"
        [class.selected]="isSelected(lote)"
        role="button"
        tabindex="0"
        (click)="onLoteClick(lote)"
        (keydown.enter)="onLoteClick(lote)"
        [title]="getTooltip(lote)"
      >
        <span class="lote-icon">{{ getEstadoIcon(lote.estado) }}</span>

        <span class="lote-number">{{ lote.numero }}</span>

        <span class="lote-status-tag">{{ lote.estado.toLowerCase() }}</span>
      </div>
    }
  </div>

  <div class="legend">
    <span class="legend-item"
      ><span class="dot available"></span> Disponible</span
    >
    <span class="legend-item"
      ><span class="dot reserved"></span> Reservado</span
    >
    <span class="legend-item"><span class="dot sold"></span> Vendido</span>
    <span class="legend-item"><span class="dot blocked"></span> Bloqueado</span>
  </div>
</div>
