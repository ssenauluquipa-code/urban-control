<app-modal-container
  #modal
  [mainTitleModal]="loteData ? 'Editar Lote' : 'Registrar Nuevo Lote'"
  (onSaveAction)="Save.emit()"
  (onCancelAction)="modal.activeModal.close()"
>
  <form nz-form [formGroup]="loteForm" nzLayout="vertical">
    <!-- SECCIÓN 1: IDENTIFICACIÓN -->
    <nz-card nzSize="small" nzTitle="Identificación y Costos" class="mb-3">
      <div class="row">
        <div class="col-md-4">
          <app-form-field label="N° de Lote" [required]="true">
            <nz-input-number
              formControlName="numero"
              [nzMin]="1"
              [nzStep]="1"
              style="width: 100%"
            ></nz-input-number>
          </app-form-field>
        </div>
        <div class="col-md-4">
          <app-form-field label="Área (m²)" [required]="true">
            <nz-input-number
              formControlName="areaM2"
              [nzMin]="0"
              [nzPrecision]="2"
              style="width: 100%"
            ></nz-input-number>
          </app-form-field>
        </div>
        <div class="col-md-4">
          <app-form-field label="Precio Referencial ($)">
            <nz-input-number
              formControlName="precioReferencial"
              [nzMin]="0"
              style="width: 100%"
            ></nz-input-number>
          </app-form-field>
        </div>
      </div>
    </nz-card>

    <!-- SECCIÓN 2: DIMENSIONES -->
    <nz-card
      nzSize="small"
      nzTitle="Dimensiones (Metros Lineales)"
      class="mb-3"
    >
      <div class="row">
        <div class="col-md-6">
          <app-form-field label="Lado Norte">
            <nz-input-number
              formControlName="dimensionNorte"
              [nzMin]="0"
              style="width: 100%"
            ></nz-input-number>
          </app-form-field>
        </div>
        <div class="col-md-6">
          <app-form-field label="Lado Sur">
            <nz-input-number
              formControlName="dimensionSur"
              [nzMin]="0"
              style="width: 100%"
            ></nz-input-number>
          </app-form-field>
        </div>
        <div class="col-md-6">
          <app-form-field label="Lado Este">
            <nz-input-number
              formControlName="dimensionEste"
              [nzMin]="0"
              style="width: 100%"
            ></nz-input-number>
          </app-form-field>
        </div>
        <div class="col-md-6">
          <app-form-field label="Lado Oeste">
            <nz-input-number
              formControlName="dimensionOeste"
              [nzMin]="0"
              style="width: 100%"
            ></nz-input-number>
          </app-form-field>
        </div>
      </div>
    </nz-card>

    <!-- SECCIÓN 3: INFORMACIÓN ADICIONAL -->
    <nz-card nzSize="small" nzTitle="Información Adicional" class="mb-3">
      <div class="row">
        <div class="col-md-6">
          <app-form-field label="Comisión (%)">
            <nz-input-number
              formControlName="comision"
              [nzMin]="0"
              [nzMax]="100"
              style="width: 100%"
            ></nz-input-number>
          </app-form-field>
        </div>
        <div class="col-12">
          <app-form-field label="Observaciones">
            <textarea
              nz-input
              formControlName="observaciones"
              rows="2"
            ></textarea>
          </app-form-field>
        </div>
      </div>
    </nz-card>

    <!-- 📸 SECCIÓN 4: GALERÍA DE IMÁGENES (Solo visible si es Edición) -->
    <!-- En modo creación, se suben después de guardar por lógica del backend -->
    @if (loteData) {
      <nz-card nzSize="small" nzTitle="Galería de Imágenes">
        <!-- Input para subir archivos -->
        <div class="mb-3">
          <label class="btn btn-outline-primary btn-sm">
            <i class="bi bi-upload"></i> Seleccionar Fotos
            <input
              type="file"
              multiple
              accept="image/*"
              style="display: none"
              (change)="onFileChange($event)"
            />
          </label>
          <small class="text-muted ms-2">JPG, PNG (Max 5MB)</small>
        </div>

        <!-- Grid de imágenes actuales -->
        <div class="row">
          @if (loteData.imagenes && loteData.imagenes.length > 0) {
            <!-- Aquí asumimos que imagenes es un array de objetos o strings.
                     Si el backend devuelve strings simples, usamos el string directamente. -->
            @for (img of loteData.imagenes; track img) {
              <div class="col-md-4 mb-2 position-relative">
                <!-- Si img es un string (URL), úsalo directamente. Si es objeto, img.url -->
                <img
                  [src]="img"
                  [alt]="'Foto de lote ' + loteData.numero"
                  class="img-thumbnail rounded"
                  style="height: 120px; width: 100%; object-fit: cover"
                />

                <button
                  class="btn btn-sm btn-danger position-absolute"
                  style="top: 5px; right: 20px; opacity: 0.8"
                  (click)="deleteImage.emit(img)"
                >
                  <!-- Enviamos ID o la URL si no hay ID -->
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            }
          } @else {
            <div class="col-12 text-center text-muted py-4">
              <i class="bi bi-image" style="font-size: 2rem"></i>
              <p>No hay imágenes adjuntas</p>
            </div>
          }
        </div>
      </nz-card>
    }

    @if (!loteData) {
      <div class="alert alert-info mt-2">
        <small
          >ℹ️ Primero debe guardar el lote para poder agregar imágenes.</small
        >
      </div>
    }
  </form>
</app-modal-container>
