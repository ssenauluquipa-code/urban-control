<app-page-container
  title="Carga Masiva de Manzanas y Lotes"
  [loading]="loading"
  [showCustom]="true"
  customLabel="Agregar Manzana"
  customIcon="feather icon-plus"
  (CustomAction)="addManzanaRow('', '')"
  [showSave]="true"
  (Save)="guardarEstructuraMasiva()"
>
  <p>Proyecto ID: {{ proyectoId }}</p>

  <div style="height: 500px; width: 100%" class="ag-theme-alpine mt-3">
    <ag-grid-angular
      style="width: 100%; height: 100%"
      class="ag-theme-alpine"
      [rowData]="gridRowData"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [rowClassRules]="rowClassRules"
      (gridReady)="onGridReady($event)"
      (cellValueChanged)="onCellValueChanged($event)"
    >
    </ag-grid-angular>
  </div>
  <pre>{{ gridRowData | json }}</pre>
</app-page-container>
