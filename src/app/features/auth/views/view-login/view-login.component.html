<div class="auth-main">
  <div class="auth-wrapper v3">
    <div class="auth-form">
      <div class="auth-header">
        <a href="javascript:">
          <!-- <img src="assets/images/logo-urb-dark.svg" alt="logo" /> -->
        </a>
      </div>
      <div class="card my-5 position-relative">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-end mb-4">
            <h3 class="mb-0"><b>Inicio de sesión</b></h3>
            <!-- <a [routerLink]="['/register']" class="link-primary">Don't have an account?</a> -->
          </div>
          <div class="form-group mb-3">
            <label for="input-email" class="form-label"
              >Correo Electronico</label
            >
            <app-input-text
              [input_control]="email"
              input_placeholder="Ingrese su email"
            ></app-input-text>
          </div>
          <div class="form-group mb-3">
            <label for="input-password" class="form-label">Contraseña</label>
            <app-input-text
              [input_control]="password"
              input_type="password"
              input_placeholder="Ingrese su contraseña"
              [enableCheckPass]="true"
            ></app-input-text>
          </div>
          <!--  <div class="d-flex mt-1 justify-content-between">
            <div class="form-check">
              <input
                class="form-check-input input-primary"
                type="checkbox"
                id="customCheckc1"
              />
               <label class="form-check-label text-muted" for="customCheckc1">Keep me sign in</label>
            </div>
           <h5 class="text-secondary f-w-400"><a href="javascript:">Forgot Password?</a></h5>
          </div> -->
          <div class="d-grid mt-4">
            <button
              type="button"
              class="btn btn-primary"
              [disabled]="isLogin"
              (click)="submit()"
            >
              {{ isLogin ? "Iniciando..." : "Login" }}
            </button>
          </div>
        </div>

        <!-- Overlay de carga encima del card -->
        @if (isLogin) {
          <div class="login-overlay">
            <div class="login-spinner">
              <div class="double-bounce1"></div>
              <div class="double-bounce2"></div>
            </div>
            <span class="login-overlay-text">Iniciando sesión...</span>
          </div>
        }
      </div>
      <div class="auth-footer row">
        <div class="col my-1">
          <p class="m-0">
            Copyright © 2026 UrbanControl — TU FUTURO BIENES & RAÍCES
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
