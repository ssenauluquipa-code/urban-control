<app-page-container
  title="Configuración de Empresa"
  permissionScope="empresa"
  [showSave]="true"
  [showBack]="true"
  [showOptions]="false"
  (onSave)="onSubmit()"
  (onBack)="goBack()"
>
  <form nz-form [formGroup]="form" class="empresa-form" nzLayout="vertical">
    
    <div class="form-section">
      <p class="sec-label">Información Institucional</p>
      <div class="fields-grid">
        <app-form-field label="Nombre de la Organización" forId="name" [required]="true" class="full-width">
          <app-input-text 
            [input_control]="getControl('name')" 
            input_placeholder="Ej. UrbanControl"
            prefix_icon="shop">
          </app-input-text>
        </app-form-field>
      </div>
    </div>

    <div class="divider"></div>

    <div class="form-section">
      <p class="sec-label">Contacto y Ubicación</p>
      <div class="fields-grid">
        <app-form-field label="Correo Electrónico" forId="email" [required]="true">
          <app-input-text 
            [input_control]="getControl('email')" 
            input_placeholder="Email"
            input_type="email"
            prefix_icon="mail">
          </app-input-text>
        </app-form-field>

        <app-form-field label="Teléfono / WhatsApp" forId="phone" [required]="true">
          <app-input-text 
            [input_control]="getControl('phone')" 
            input_placeholder="Teléfono"
            prefix_icon="phone">
          </app-input-text>
        </app-form-field>

        <app-form-field label="Dirección Física" forId="address" class="full-width" [required]="true">
          <app-input-textarea 
            [input_control]="getControl('address')" 
            input_placeholder="Dirección completa"
            [input_rows]="2">
          </app-input-textarea>
        </app-form-field>
      </div>
    </div>

    <div class="divider"></div>

    <div class="form-section">
      <p class="sec-label">Configuración Regional</p>
      <div class="fields-grid">
        <app-form-field label="Moneda" forId="currency" [required]="true">
          <app-select-data
            [inputControl]="getControl('currency')"
            [itemList]="currenciesList"
            bindLabel="label"
            bindValue="value"
            placeholder="Seleccionar moneda">
          </app-select-data>
        </app-form-field>

        <app-form-field label="Zona Horaria" forId="timezone" [required]="true">
          <app-select-data
            [inputControl]="getControl('timezone')"
            [itemList]="timezonesList"
            bindLabel="label"
            bindValue="value"
            placeholder="Seleccionar zona">
          </app-select-data>
        </app-form-field>
      </div>
    </div>

  </form>
</app-page-container>
