<div class="row">
  <!-- Información Institucional -->
  <div class="col-12 col-md-5 col-lg-5">
    <app-card-container title="Información Institucional">
      <div class="row">
        <div class="col-12">
          <app-form-field
            label="Nombre de la Organización"
            forId="name"
            [required]="true"
          >
            <app-input-text
              [input_control]="nameControl"
              input_placeholder="Ej. UrbanControl"
              prefix_icon="shop"
            >
            </app-input-text>
          </app-form-field>
        </div>
      </div>
      <div class="row mt-3">
        <app-image-display
          [imageUrl]="logoUrl"
          [imageName]="form.value.name"
          [editable]="true"
          [emptyText]="'Sin Logo'"
          [emptyHint]="'Click para subir logo'"
          (imageUpdated)="imageUpdated.emit($event)"
          (imageDeleted)="imageDeleted.emit()"
        >
        </app-image-display>
      </div>
    </app-card-container>
  </div>

  <div class="col-12 col-md-7 col-lg-7">
    <div class="row">
      <!-- Contacto y Ubicación -->
      <div class="col-12">
        <app-card-container title="Contacto y Ubicación">
          <div class="row">
            <div class="col-12 col-sm-6">
              <app-form-field
                label="Correo Electrónico"
                forId="email"
                [required]="true"
              >
                <app-input-text
                  [input_control]="emailControl"
                  input_placeholder="Email"
                  input_type="email"
                  prefix_icon="mail"
                >
                </app-input-text>
              </app-form-field>
            </div>
            <div class="col-12 col-sm-6">
              <app-form-field
                label="Celular / WhatsApp"
                forId="phone"
                [required]="true"
              >
                <app-input-text
                  [input_control]="phoneControl"
                  input_placeholder="Teléfono"
                  prefix_icon="phone"
                >
                </app-input-text>
              </app-form-field>
            </div>
            <div class="col-12">
              <app-form-field
                label="Dirección Física"
                forId="address"
                [required]="true"
              >
                <app-input-textarea
                  [input_control]="addressControl"
                  input_placeholder="Dirección completa"
                  [input_rows]="2"
                >
                </app-input-textarea>
              </app-form-field>
            </div>
          </div>
        </app-card-container>
      </div>

      <!-- Parámetros de Sistema -->
      <!-- <div class="col-12">
        
      </div> -->
    </div>
  </div>
  <div class="col-12">
    <app-card-container title="Parámetros de Sistema">
          <div class="row">
            <!-- FILA 1: 3 campos -->
            <div class="col-12 col-sm-6 col-md-4">
              <app-form-field label="Moneda" forId="currency" [required]="true">
                <app-select-moneda
                  [input_control]="currencyControl"
                  (Change)="onMonedaChange($event)"
                  placeholder="Seleccionar moneda"
                >
                </app-select-moneda>
              </app-form-field>
            </div>

            <div class="col-12 col-sm-6 col-md-4">
              <app-form-field
                label="Tipo de Cambio"
                forId="tipoDeCambio"
                [required]="true"
              >
                <app-input-number
                  [input_control]="tipoDeCambioControl"
                  input_placeholder="Ej. 6.96"
                  [allow_decimals]="true"
                  [decimal_precision]="2"
                >
                </app-input-number>
              </app-form-field>
            </div>

            <div class="col-12 col-sm-6 col-md-4">
              <app-form-field
                label="Hora de Cron Diario (0-23)"
                forId="horaCron"
                [required]="true"
              >
                <app-input-number
                  [input_control]="horaCronControl"
                  input_placeholder="Ej. 8"
                >
                </app-input-number>
              </app-form-field>
            </div>

            <!-- FILA 2: 2 campos -->
            <div class="col-12 col-sm-6">
              <app-form-field
                label="Vencimiento de Reserva (Días)"
                forId="diasVencimiento"
                [required]="true"
              >
                <app-input-number
                  [input_control]="diasVencimientoControl"
                  input_placeholder="Ej. 5"
                >
                </app-input-number>
              </app-form-field>
            </div>

            <div class="col-12 col-sm-6">
              <app-form-field
                label="Plazo Máximo (Meses)"
                forId="plazoMax"
                [required]="true"
              >
                <app-input-number
                  [input_control]="plazoMaximoControl"
                  input_placeholder="Ej. 18"
                >
                </app-input-number>
              </app-form-field>
            </div>
          </div>
        </app-card-container>
  </div>
</div>
