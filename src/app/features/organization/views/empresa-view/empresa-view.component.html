@if (isLoading) {
  <div class="loading-container">
    <div class="spinner"></div>
    <p>Cargando configuración...</p>
  </div>
} @else if (empresaData) {
  <div class="compact-container">
    <!-- 🔝 HEADER SUPERIOR -->
    <div class="org-top mb-3">
      <div class="org-main">
        <h2 class="org-title">{{ empresaData.name }}</h2>
        <p class="org-subtitle">{{ empresaData.subdomain }}.urbancontrol.app</p>
      </div>

      <div class="status-tag" [class.active]="empresaData.isActive">
        {{ empresaData.isActive ? "Activo" : "Inactivo" }}
      </div>
    </div>

    <!-- 🔥 ROW PRINCIPAL -->
    <div class="row g-4">
      <!-- 🖼 LOGO GRANDE -->
      <div class="col-md-4">
        <app-image-display
          [imageUrl]="empresaData.logoUrl"
          variant="logo"
          [editable]="false"
          [emptyText]="'Sin Logo'"
          [emptyHint]="'El logo no se puede modificar'"
          (imageUpdated)="onLogoUpload($event)"
          (imageDeleted)="onLogoDelete()"
        ></app-image-display>
      </div>

      <!-- 📇 CONTACTO AL LADO -->
      <div class="col-md-8">
        <app-card-container title="Información de contacto">
          <div class="row g-3">
            <div class="col-md-6">
              <app-input-text-info
                label="Correo Electrónico"
                [value]="empresaData.email"
                [showCopy]="true"
              ></app-input-text-info>
            </div>
            <div class="col-md-6">
              <app-input-text-info
                label="Teléfono"
                [value]="empresaData.phone"
              ></app-input-text-info>
            </div>
            <div class="col-12">
              <app-input-text-info
                label="Dirección Física"
                [value]="empresaData.address"
                [multiline]="true"
              ></app-input-text-info>
            </div>
          </div>
        </app-card-container>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-md-4">
        <app-card-container title="Configuración Regional">
          <div class="row g-3">
            <div class="col-md-6">
              <app-input-text-info
                label="Moneda"
                [value]="empresaData.currency"
              ></app-input-text-info>
            </div>
            <div class="col-md-6">
              <app-input-text-info
                label="Tipo de Cambio"
                [value]="empresaData.tipoDeCambio.toString()"
              ></app-input-text-info>
            </div>
          </div>
        </app-card-container>
      </div>

      <div class="col-md-8">
        <app-card-container title="Parámetros de Sistema" icon="setting">
          <div class="row g-3">
            <div class="col-md-4">
              <app-input-text-info
                label="Vencimiento Reserva"
                [value]="empresaData.diasVencimientoReserva + ' Días'"
              ></app-input-text-info>
            </div>
            <div class="col-md-4">
              <app-input-text-info
                label="Plazo Máximo"
                [value]="empresaData.plazoMaximoMeses + ' Meses'"
              ></app-input-text-info>
            </div>
            <div class="col-md-4">
              <app-input-text-info
                label="Hora de Ejecución"
                [value]="empresaData.horaCronDiario + ':00'"
              ></app-input-text-info>
            </div>
          </div>
        </app-card-container>
      </div>
    </div>
  </div>
}
