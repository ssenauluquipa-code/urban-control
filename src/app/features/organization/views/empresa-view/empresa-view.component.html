
@if (isLoading) {
  <div class="loading-container">
    <div class="spinner"></div>
    <p>Cargando configuración...</p>
  </div>
} @else if (empresaData) {
  <!-- GRID -->
  <div class="view-grid">

    <!-- DATOS DE EMPRESA -->
    <app-card-container>
      <div class="card-header">
        <h3>Datos de la empresa</h3>
      </div>

      <div class="info-grid">
        <app-input-text-info
          label="Nombre Comercial"
          [value]="empresaData.nombreComercial">
        </app-input-text-info>

        <app-input-text-info
          label="Razón Social"
          [value]="empresaData.razonSocial">
        </app-input-text-info>

        <app-input-text-info
          label="NIT"
          [value]="empresaData.nit">
        </app-input-text-info>

        <app-input-text-info
          label="Dirección"
          [value]="empresaData.direccion"
          class="full-width">
        </app-input-text-info>
      </div>
    </app-card-container>

    <!-- CONTACTO -->
    <app-card-container>
      <div class="card-header">
        <h3>Contacto</h3>
      </div>

      <div class="info-grid">
        <app-input-text-info
          label="Correo Electrónico"
          [value]="empresaData.email"
          [showCopy]="true">
        </app-input-text-info>

        <app-input-text-info
          label="Teléfono"
          [value]="empresaData.telefono">
        </app-input-text-info>
      </div>
    </app-card-container>

    <!-- CONFIGURACIÓN DE RESERVAS -->
    <app-card-container>
      <div class="card-header">
        <h3>Configuración de reservas</h3>
      </div>

      <div class="info-grid">
        <app-input-text-info
          label="Días de vencimiento"
          [value]="empresaData.diasReservaVencimiento.toString()"
          helperText="Las reservas vencen automáticamente después de este número de días">
        </app-input-text-info>

        <app-input-text-info
          label="Símbolo de moneda"
          [value]="empresaData.monedaSimbolo">
        </app-input-text-info>
      </div>
    </app-card-container>

  </div>
} @else {
  <div class="empty-state">
    <p>No se encontró información de la empresa.</p>
  </div>
}
