<div class="container-fluid px-0 mt-3 animate-fade-in">
  
    <app-report-filter
      [formGroup]="filterForm"
      [columnDefs]="columnas"
      [mostrarBtnLimpiar]="!!(filterForm.value.fechaInicio || filterForm.value.fechaFin)"
      (onLimpiar)="limpiarFiltros()"
      (visibilidadColumnaChange)="onCambiarVisibilidadColumnas($event)">
      
      <div class="row w-100">
        <div class="col-12 col-sm-6 col-md-5 col-xl-4 mb-2 mb-sm-0">
          <app-form-field label="Fecha Inicio">
            <app-input-date [input_control]="$any(filterForm.get('fechaInicio'))"></app-input-date>
          </app-form-field>
        </div>
        
        <div class="col-12 col-sm-6 col-md-5 col-xl-4">
          <app-form-field label="Fecha Fin">
            <app-input-date [input_control]="$any(filterForm.get('fechaFin'))"></app-input-date>
          </app-form-field>
        </div>
      </div>
    </app-report-filter>
  

    <app-data-table
      #tablaComponent
      [showCreate]="false"
      [columnDefs]="columnas"
      [rowData]="datos"
      [actions]="[]"
      emptyMessage="No se encontraron registros de pagos en el rango seleccionado.">
    </app-data-table>  
</div>
