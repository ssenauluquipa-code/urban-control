<form [formGroup]="filterForm" class="filter-form-row">
  
  <div class="filters-inputs-group">
    <div class="form-group-inline">
      <div class="input-icon-wrapper">
        <i class="bi bi-search pre-icon"></i>
        <select id="manzanaId" formControlName="manzanaId" class="custom-select-inline">
          <option value="">Seleccionar Manzana</option>
          @for (mz of manzanas; track mz) {
            <option [value]="mz">{{ mz | uppercase }}</option>
          }
        </select>
      </div>
    </div>
    
    <div class="form-group-inline">
      <div class="input-icon-wrapper">
        <i class="bi bi-funnel pre-icon"></i>
        <select id="estado" formControlName="estado" class="custom-select-inline">
          <option value="">Estado Comercial: Todos</option>
          @for (est of estados; track est) {
            <option [value]="est">{{ est }}</option>
          }
        </select>
      </div>
    </div>

    <button type="button" class="btn-clear-link" *ngIf="filterForm.value.manzanaId || filterForm.value.estado" (click)="limpiarFiltros()">
      <i class="bi bi-arrow-counterclockwise"></i> Limpiar Filtros
    </button>
  </div>

  <div class="filters-actions-group">
    <app-tabla-previsualizacion 
      [columnDefs]="columnDefs"
      (visibilityChange)="onVisibilityChange($event)">
    </app-tabla-previsualizacion>
  </div>

</form>
