<app-page-container
  title="Centro de Reportes"
  permissionScope="reportes"
  [showOptions]="false"
  [showBack]="true"
>

  <!-- ====== GRID DE REPORTES USANDO EL NUEVO COMPONENTE ATÓMICO ====== -->
  <div class="row g-4 animate-fade-in">
    @for (tarjeta of tarjetasReporte; track tarjeta.id) {
      <div class="col-12 col-sm-6 col-lg-3">
        <app-panel-tarjetas 
          [tarjeta]="tarjeta" 
          (clickReporte)="abrirReporte($event)">
        </app-panel-tarjetas>
      </div>
    }
  </div>

</app-page-container>
