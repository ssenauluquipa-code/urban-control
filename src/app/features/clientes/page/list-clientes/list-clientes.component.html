<app-page-container
  title="Gestión de Clientes"
  [permissionScope]="EAppModule.CLIENTES"
  [showNew]="true"
  (AddNew)="onAddNew()"
  (MenuExportPDF)="exportarPDF()"
  (MenuExportExcel)="exportarExcel()"
>
  <!-- Tabla con Filtro Local (Nueva) -->
  <app-data-table
    #tablaClientes
    [module]="EAppModule.CLIENTES"
    [rowData]="clientes"
    [columnDefs]="columnDefs"
    [loading]="loading"
    [pageSize]="limit"
    [showCreate]="false"
    [actions]="[
      tableActionEnum.EDIT,
      tableActionEnum.UPLOAD_PHOTO,
      tableActionEnum.REMOVE_IMAGE,
      tableActionEnum.DEACTIVATE,
      tableActionEnum.ACTIVATE,
      tableActionEnum.VIEW,
    ]"
    (actionClicked)="onTableAction($event)"
  >
  </app-data-table>

  <!-- Tabla con Filtro Remoto (Comentada para referencia)
  <app-data-table-server
    [rowData]="clientes"
    [columnDefs]="columnDefs"
    [loading]="loading"
    [pageSize]="limit"
    [totalRecords]="totalRecords"
    [showCreate]="false"
    [actions]="[
      tableActionEnum.EDIT,
      tableActionEnum.UPLOAD_PHOTO,
      tableActionEnum.REMOVE_IMAGE,
      tableActionEnum.DEACTIVATE,
      tableActionEnum.ACTIVATE,
      tableActionEnum.VIEW,
    ]"
    (actionClicked)="onTableAction($event)"
    (filterChanged)="onTableFilterChanged($event)"
    (pageChange)="loadClientes($event)"
  >
  </app-data-table-server>
  -->
</app-page-container>
