<app-page-container
  [title]="isEditMode ? 'Editar Cliente' : 'Nuevo Cliente'"
  [permissionScope]="EAppModule.CLIENTES"
  [showNew]="false"
  [showOptions]="false"
  [showCancel]="true"
  [showSave]="true"
  (Save)="onSubmit()"
  [loading]="loading"
>
  <app-form-clientes-view 
    [formInput]="form"
    (imageSelected)="onImageSelected($event)"
    (imageDeleted)="onImageDeleted()"
  ></app-form-clientes-view>
</app-page-container>
