<form [formGroup]="userForm">
  <div class="row g-3">
    <!-- FOTO -->
    <div
      class="col-12 col-sm-4 d-flex align-items-stretch justify-content-center"
    >
      <app-image-display
        [imageUrl]="userData?.avatarUrl || ''"
        [editable]="true"
        [emptyText]="'Sin Foto'"
        [emptyHint]="'Click para subir avatar'"
        (imageUpdated)="imageSelected.emit($event)"
        +
      >
      </app-image-display>
    </div>

    <!-- CAMPOS -->
    <div class="col-12 col-sm-8">
      <div class="row">
        <!-- Nombre completo -->
        <div class="col-12">
          <app-form-field label="Nombre Completo" [required]="true">
            <app-input-text
              [input_control]="name"
              input_placeholder="Ej. Juan Perez"
            >
            </app-input-text>
          </app-form-field>
        </div>

        <!-- Email + Teléfono -->
        <div class="col-12 col-md-6">
          <app-form-field label="Correo Electrónico" [required]="true">
            <app-input-text
              [input_control]="email"
              input_placeholder="ejemplo@correo.com"
            >
            </app-input-text>
          </app-form-field>
        </div>
        <div class="col-12 col-md-6">
          <app-form-field label="Número de Contacto" [required]="true">
            <app-input-number
              [input_control]="contactNumber"
              [input_placeholder]="'591 70000000'"
            >
            </app-input-number>
          </app-form-field>
        </div>

        <!-- Rol + Asesor -->
        <div class="col-12 col-md-6">
          <app-form-field label="Rol del Sistema">
            <nz-select formControlName="role" nzPlaceHolder="Seleccionar rol">
              <nz-option nzValue="ADMIN" nzLabel="Administrador"></nz-option>
              <nz-option nzValue="EDITOR" nzLabel="Editor"></nz-option>
            </nz-select>
          </app-form-field>
        </div>
        <div class="col-12 col-md-6">
          <app-form-field label="Asesor Asociado">
            <app-select-asesor
              [input_control]="asesorId"
              (SelectionChange)="asesorSelected.emit($event)"
            ></app-select-asesor>
          </app-form-field>
        </div>

        <!-- Contraseña solo al crear -->
        @if (!userData) {
          <div class="col-12">
            <app-form-field label="Contraseña Temporal" [required]="true">
              <app-input-text
                [input_control]="password"
                [input_type]="'password'"
                input_placeholder="Mínimo 8 caracteres"
                [enableCheckPass]="true"
              >
              </app-input-text>
            </app-form-field>
          </div>
        }

        @if (userData) {
          <div class="col-12">
            <small class="text-muted">
              <i class="bi bi-info-circle"></i>
              Para cambiar la contraseña, utilice la opción de "Mi Perfil".
            </small>
          </div>
        }
      </div>
    </div>
  </div>
</form>
