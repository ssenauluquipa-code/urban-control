<div class="dt-wrapper">
  <!-- Toolbar -->
  <div class="dt-toolbar">
    @if (showCreate) {
      <button class="dt-btn-create" (click)="onCreateClick()">
        <i class="bi bi-plus-lg"></i> Crear
      </button>
    }
  </div>

  <!-- Grid container -->
  <div class="dt-grid-wrapper" [style.height]="height">
    <ag-grid-angular
      #gridContainer
      class="ag-theme-quartz dt-grid"
      style="width: 100%; height: 100%; display: block"
      [columnDefs]="computedColumnDefs"
      [gridOptions]="gridOptions"
      (gridReady)="onGridReady($event)"
      (rowClicked)="onRowClicked($event)"
    ></ag-grid-angular>

    @if (loading) {
      <div class="dt-loading-overlay">
        <div class="dt-spinner"></div>
      </div>
    }
  </div>
</div>
