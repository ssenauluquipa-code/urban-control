@if (esGraficoVacio) {
  <div class="card w-100 border-0 shadow-sm rounded-lg py-5 animate-fade-in text-center">
    <div class="card-body">
      <div class="mb-3">
        <i class="bi bi-graph-down text-muted" style="font-size: 3rem;"></i>
      </div>
      <h5 class="fw-bold text-secondary">Sin transacciones en este período</h5>
      <p class="text-muted mx-auto" style="max-width: 420px; font-size: 0.9rem;">
        No se registraron transacciones comerciales en el rango de fechas seleccionado para el proyecto activo.
      </p>
    </div>
  </div>
} @else {
  <app-card-container [noPadding]="true" class="h-100 animate-fade-in">
    <div class="chart-wrapper">
      <!-- Cabecera Responsiva: Centrada y vertical en móvil, alineada y horizontal en desktop -->
      <div class="chart-header">
        <span class="icon-badge bg-light-{{ iconColor }} text-{{ iconColor }}">
          <i [class]="icon + ' fs-5'"></i>
        </span>
        <div class="header-content">
          <h5 class="chart-title">{{ title }}</h5>
          <small class="chart-subtitle">{{ subtitle }}</small>
        </div>
      </div>

      <!-- Gráfico con altura responsive -->
      <div class="chart-container" *ngIf="chartOptions">
        <apx-chart 
          [series]="chartOptions.series!" 
          [chart]="chartOptions.chart!"
          [xaxis]="chartOptions.xaxis!" 
          [yaxis]="chartOptions.yaxis!"
          [grid]="chartOptions.grid!" 
          [stroke]="chartOptions.stroke || {}" 
          [tooltip]="chartOptions.tooltip!" 
          [dataLabels]="chartOptions.dataLabels!"
          [colors]="chartOptions.colors!">
        </apx-chart>
      </div>
    </div>
  </app-card-container>
}
