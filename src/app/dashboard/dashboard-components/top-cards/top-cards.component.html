<div class="row">
  <div class="col-6 col-md-6 col-lg-3 mb-3" *ngFor="let topcard of topcards">
    <div
      class="card card-hover-effect mb-0"
      (click)="!loading && redirigirALista(topcard)"
      [style.cursor]="loading ? 'default' : 'pointer'"
      [style.opacity]="loading ? 0.75 : 1"
      role="button"
    >
      <div class="card-body p-3">
        <div class="d-flex flex-column flex-sm-row align-items-center text-center text-sm-start">
          <div class="rounded-circle d-flex align-items-center justify-content-center bg-light-{{topcard.bgcolor}} text-{{topcard.bgcolor}}" style="width: 48px; height: 48px; min-width: 48px; min-height: 48px; flex-shrink: 0;">
            <i [class]="topcard.icon" style="font-size: 1.25rem;"></i>
          </div>
          <div class="ms-0 ms-sm-3 mt-2 mt-sm-0 w-100">
            <h3 class="mb-0 font-weight-bold d-flex align-items-center justify-content-center justify-content-sm-start" style="min-height: 27px;">
              @if (loading) {
                <div class="spinner-border spinner-border-sm text-secondary" role="status" style="width: 1.2rem; height: 1.2rem; border-width: 0.15em;">
                  <span class="visually-hidden">Cargando...</span>
                </div>
              } @else {
                {{ topcard.currentValue }}
              }
            </h3>
            <small class="text-muted fs-3 d-block text-truncate-custom" [title]="topcard.title">{{ topcard.title }}</small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  /* Prevenir desbordamiento y asegurar tamaño de fuente adecuado en celulares muy pequeños */
  @media (max-width: 576px) {
    .text-truncate-custom {
      font-size: 11px !important;
      white-space: normal;
      line-height: 1.2;
      margin-top: 2px;
    }
  }
</style>
