  <li class="dropdown pc-h-item header-user-profile" ngbDropdown *ngIf="currentUser() as user">
    <a
      href="javascript:"
      class="pc-head-link dropdown-toggle arrow-none me-0"
      ngbDropdownToggle
    >
      <img
        [src]="
          user?.avatarUrl ||
          '../../../../assets/images/user/avatar-2.jpg'
        "
        alt="user-image"
        class="user-avatar rounded-circle shadow-sm"
        style="
          width: 40px;
          height: 40px;
          object-fit: cover;
          border: 1px solid #eef2f6;
        "
      />
      <span class="f-w-600 ms-2 d-none d-lg-inline-block">{{
        user?.name || "Usuario"
      }}</span>
    </a>

    <div
      class="dropdown-menu dropdown-user-profile dropdown-menu-end pc-h-dropdown"
      ngbDropdownMenu
    >
      <div class="dropdown-header">
        <div class="d-flex mb-1 align-items-center">
          <div class="flex-shrink-0">
            <img
              [src]="
                user?.avatarUrl ||
                '../../../../assets/images/user/avatar-2.jpg'
              "
              alt="user-image"
              class="user-avatar rounded-circle border shadow-sm"
              style="width: 55px; height: 55px; object-fit: cover"
            />
          </div>
          <div class="flex-grow-1 ms-3 text-start">
            <h6 class="mb-0">{{ user?.name || "Usuario" }}</h6>
            <span class="text-muted small">{{
              user.role || "Personal"
            }}</span>
          </div>
          <a href="javascript:" class="bg-transparent" (click)="logout()">
            <i
              class="d-flex f-20 text-danger"
              antIcon
              theme="outline"
              type="logout"
            ></i>
          </a>
        </div>
      </div>

      <ul ngbNav #nav="ngbNav" class="nav drp-tabs nav-fill nav-tabs">
        <li ngbNavItem="1">
          <a ngbNavLink>
            <span nz-icon nzType="user" class="me-2"></span> Perfil
          </a>
          <ng-template ngbNavContent>
            @for (task of profile; track task) {
              <a
                href="javascript:"
                class="dropdown-item"
                (click)="handleProfileClick(task.title)"
              >
                <span
                  nz-icon
                  [nzType]="task.icon"
                  class="text-muted me-2"
                ></span>
                <span>{{ task.title }}</span>
              </a>
            }
          </ng-template>
        </li>
        <!-- <li ngbNavItem="2">
          <a ngbNavLink>
            <span nz-icon nzType="setting" class="me-2"></span> Ajustes

                  class="text-muted me-2"
                ></span>
                <span>{{ task.title }}</span>
              </a>
            }
          </ng-template>
        </li>-->
      </ul>
      <div [ngbNavOutlet]="nav" class="mt-2"></div>
    </div>
  </li>
</ul>
